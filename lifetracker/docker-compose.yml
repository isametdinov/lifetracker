version: '3.8'
services:
  server:
    build:
      context: ./lifetracker/server
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=lifetracker
      - DB_USER=postgres
      - DB_PASSWORD=root
    env_file:
      - ./lifetracker/server/.env
    volumes:
      - ./lifetracker/server:/app
      - /app/node_modules
    command: npm run dev

  client:
    build:
      context: ./lifetracker/client
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    volumes:
      - ./lifetracker/client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - server
